[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/upload-to-drive"
  to = "/.netlify/functions/upload-to-drive"
  status = 200

[[redirects]]
  from = "/api/submit-to-close"
  to = "/.netlify/functions/submit-to-close"
  status = 200

[[redirects]]
  from = "/api/send-kit-email"
  to = "/.netlify/functions/send-kit-email"
  status = 200

[[redirects]]
  from = "/api/maps-key"
  to = "/.netlify/functions/maps-key"
  status = 200

# Renter referral links — pmc.splitpay.com/go?ref=[slug] → rent.app/go
[[redirects]]
  from = "/go"
  to = "/.netlify/functions/ref-redirect"
  status = 200

# Partner welcome + monthly reminder email function
[[redirects]]
  from = "/api/send-partner-email"
  to = "/.netlify/functions/send-partner-email"
  status = 200

[functions."partner-reminder"]
  schedule = "0 14 20 * *"   # 20th of each month, 9 AM ET

[functions."newsletter-send-15"]
  schedule = "0 9 15 * *"

[functions."newsletter-send-28"]
  schedule = "0 9 28 * *"

[functions."newsletter-send-01"]
  schedule = "0 9 1 * *"

[functions."newsletter-send-06"]
  schedule = "0 9 6 * *"

[[headers]]
  for = "/internal/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"